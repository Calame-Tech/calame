name: Publish npm package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync version from root package.json
        run: |
          VERSION=$(node -p "require('./package.json').version")
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('packages/create/package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('packages/create/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish create-calame to npm
        run: npm publish packages/create --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
